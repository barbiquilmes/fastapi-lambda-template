<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }

    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
    }

    h1 { font-size: 1.25rem; margin-bottom: 24px; }

    label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 4px; }

    input, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      margin-bottom: 16px;
      font-family: inherit;
    }

    textarea { resize: vertical; min-height: 100px; }

    button {
      width: 100%;
      padding: 10px;
      background: #222;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    button:hover { background: #444; }
    button:disabled { background: #aaa; cursor: default; }

    .error { color: #c00; font-size: 0.85rem; margin-top: 8px; }

    .note {
      border-top: 1px solid #eee;
      padding: 12px 0;
    }

    .note:first-child { border-top: none; }

    .note-content { margin-bottom: 4px; }

    .note-date { font-size: 0.75rem; color: #999; }

    #notes-list { margin-top: 24px; }

    .section-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

<div class="card">

  <!-- Login -->
  <div id="login-view">
    <h1>Sign in</h1>
    <label>Username</label>
    <input id="username" type="text" autocomplete="username">
    <label>Password</label>
    <input id="password" type="password" autocomplete="current-password">
    <button id="login-btn" onclick="login()">Sign in</button>
    <div class="error" id="login-error"></div>
  </div>

  <!-- Notes -->
  <div id="notes-view" style="display:none">
    <h1>Notes</h1>
    <label>New note</label>
    <textarea id="note-input" placeholder="Write something..."></textarea>
    <button id="save-btn" onclick="saveNote()">Save</button>
    <div class="error" id="save-error"></div>
    <div id="notes-list"></div>
  </div>

</div>

<script>
  const API = "https://your-api-gateway-url.execute-api.eu-west-1.amazonaws.com";
  let token = null;

  async function login() {
    const btn = document.getElementById("login-btn");
    const err = document.getElementById("login-error");
    err.textContent = "";
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: document.getElementById("username").value,
          password: document.getElementById("password").value,
        }),
      });

      if (!res.ok) {
        err.textContent = "Invalid credentials";
        return;
      }

      const data = await res.json();
      token = data.token;
      document.getElementById("login-view").style.display = "none";
      document.getElementById("notes-view").style.display = "block";
      loadNotes();
    } catch {
      err.textContent = "Could not reach the server";
    } finally {
      btn.disabled = false;
    }
  }

  async function saveNote() {
    const btn = document.getElementById("save-btn");
    const err = document.getElementById("save-error");
    const input = document.getElementById("note-input");
    err.textContent = "";

    if (!input.value.trim()) return;
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/items`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`,
        },
        body: JSON.stringify({ content: input.value.trim() }),
      });

      if (!res.ok) {
        err.textContent = "Failed to save note";
        return;
      }

      input.value = "";
      loadNotes();
    } catch {
      err.textContent = "Could not reach the server";
    } finally {
      btn.disabled = false;
    }
  }

  async function loadNotes() {
    const list = document.getElementById("notes-list");

    try {
      const res = await fetch(`${API}/items`, {
        headers: { "Authorization": `Bearer ${token}` },
      });
      const data = await res.json();
      const items = data.items.sort((a, b) => b.datePillar.localeCompare(a.datePillar));

      if (items.length === 0) {
        list.innerHTML = "";
        return;
      }

      list.innerHTML = `<div class="section-title">Saved notes</div>` +
        items.map(item => `
          <div class="note">
            <div class="note-content">${escapeHtml(item.content)}</div>
            <div class="note-date">${new Date(item.datePillar).toLocaleString()}</div>
          </div>
        `).join("");
    } catch {
      list.innerHTML = "";
    }
  }

  function escapeHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  document.getElementById("password").addEventListener("keydown", e => {
    if (e.key === "Enter") login();
  });
</script>

</body>
</html>
